<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Program Details - GVHSS</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --glass-bg: rgba(255, 255, 255, 0.1); --glass-border: rgba(255, 255, 255, 0.2); }
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #00b09b); background-size: 400% 400%; animation: gradientBG 15s ease infinite; color: white; min-height: 100vh; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        nav { background: rgba(15, 32, 39, 0.6); backdrop-filter: blur(15px); padding: 15px 30px; border-bottom: 1px solid var(--glass-border); display: flex; align-items: center; }
        .back-btn { text-decoration: none; color: white; font-weight: 500; display: flex; align-items: center; gap: 8px; border: 1px solid rgba(255,255,255,0.4); padding: 8px 16px; border-radius: 20px; transition: background 0.3s; }
        .back-btn:hover { background: rgba(255,255,255,0.2); }

        .container { max-width: 800px; margin: 60px auto; padding: 0 20px; }
        .content-card { background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 15px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); text-align: center; }
        
        h1 { font-family: 'Playfair Display', serif; color: #a8ff78; font-size: 2.8rem; margin-top: 0; margin-bottom: 20px; }
        p { font-size: 1.15rem; line-height: 1.8; color: #e0e0e0; font-weight: 300; }
        
        .placeholder-img { width: 100%; height: 350px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 12px; margin-bottom: 30px; display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.5); font-size: 1.2rem; }
        .real-img { width: 100%; height: 350px; object-fit: cover; border-radius: 12px; margin-bottom: 30px; display: none; box-shadow: 0 10px 20px rgba(0,0,0,0.2); border: 1px solid var(--glass-border); }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="back-btn">← Back to Main Website</a>
    </nav>

    <div class="container">
        <div class="content-card">
            <img id="activity-img" class="real-img" src="" alt="Program Image">
            <div id="placeholder" class="placeholder-img">No Image Uploaded</div>
            
            <h1 id="activity-title">Loading...</h1>
            <p id="activity-desc">Please wait while we fetch the details.</p>
        </div>
    </div>

    <script>
        const activityData = {
            'kites': { title: "Little Kites", desc: "Kerala Infrastructure and Technology for Education (KITE). This IT club empowers students in areas like programming, hardware, animation, and electronics." },
            'jrc': { title: "Junior Red Cross (JRC)", desc: "The JRC promotes health, service, and friendship. Students learn first-aid, participate in community service, and develop a strong sense of empathy." },
            'nature': { title: "Nature Club", desc: "Dedicated to environmental protection and awareness. Students engage in tree planting, eco-friendly campaigns, and preserve ecosystems." },
            'ogt': { title: "On-the-Job Training (OGT)", desc: "A core part of our Vocational curriculum. OGT provides students with real-world industry experience, bridging the gap between theory and practice." },
            'field': { title: "Field Visits", desc: "Taking education beyond the classroom walls. We organize regular educational tours to industries and institutions for practical insights." },
            'yip': { title: "Young Innovators Programme (YIP)", desc: "An initiative to empower young minds to innovate. Students are encouraged to identify problems and develop practical solutions." },
            'nss': { title: "National Service Scheme (NSS)", desc: "'Not Me But You.' The NSS develops student personality through community service, social work, camps, and leadership training." },
            'wde': { title: "Web Developer (WDE)", desc: "A highly demanded technical course focused on modern web development. Students learn the foundational languages of the internet—HTML, CSS, and JavaScript—along with graphic design basics to build dynamic, professional websites and applications." },
            'ltr': { title: "Lab Technician (LTR)", desc: "A vital healthcare vocational program. Students are trained in clinical laboratory procedures, gaining hands-on experience in diagnostic testing, medical equipment operation, chemistry, and strict lab safety protocols." },
            
            // Replaced the title to just say "DIA"
            'dia': { title: "DIA", desc: "" }
        };

        const urlParams = new URLSearchParams(window.location.search);
        const activityId = urlParams.get('id');

        if (activityId && activityData[activityId]) {
            document.getElementById('activity-title').innerText = activityData[activityId].title;
            document.getElementById('activity-desc').innerText = activityData[activityId].desc;

            const savedImage = localStorage.getItem(activityId + '-img');
            const imgElement = document.getElementById('activity-img');
            const placeholderElement = document.getElementById('placeholder');

            if (savedImage && savedImage.trim() !== "") {
                imgElement.src = savedImage;
                imgElement.style.display = 'block';
                placeholderElement.style.display = 'none';
            }
        } else {
            document.getElementById('activity-title').innerText = "Program Not Found";
            document.getElementById('activity-desc').innerText = "Sorry, we couldn't find the details for this specific program.";
        }
    </script>
</body>
</html>
